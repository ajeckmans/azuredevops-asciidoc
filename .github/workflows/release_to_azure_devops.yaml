name: Release to Azure DevOps Marketplace

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'

jobs:
  package-and-publish:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js environment
        uses: actions/setup-node@v2
        with:
          node-version: 'lts/*'

      - name: Install tfx-cli
        run: npm install -g tfx-cli

      - name: Set version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            PUBLISHED_JSON=$(tfx extension show --publisher ajeckmans --extension-id asciidoc --token ${{ secrets.AZURE_DEVOPS_PAT }} --json || echo "{}")
            PUBLISHED_VERSION=$(echo "$PUBLISHED_JSON" | jq -r '.versions[0].version')
            
            if [ -z "$PUBLISHED_VERSION" ] || [ "$PUBLISHED_VERSION" == "null" ]; then
              PUBLISHED_VERSION=$(grep -o '"version": *"[^"]*"' vss-extension.json | grep -o '[0-9.]*' | head -1)
            fi
            
            IFS='.' read -ra V_PARTS <<< "$PUBLISHED_VERSION"
            NEXT_PATCH=$((${V_PARTS[2]} + 1))
            EXT_VERSION="${V_PARTS[0]}.${V_PARTS[1]}.${NEXT_PATCH}"
          else
            EXT_VERSION=$(grep -o '"version": *"[^"]*"' vss-extension.json | grep -o '[0-9.]*' | head -1)
          fi
          
          echo "EXT_VERSION=${EXT_VERSION}" >> $GITHUB_ENV

      - name: Restore npm packages
        run: npm ci --legacy-peer-deps

      - name: Run Tests
        run: npm run test

      - name: Build task bundle
        run: npm run build

      - name: Package & Publish Extension
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # For PRs, modify the manifest and publish directly using --rev-version to auto-increment privately
            sed -i 's/"id": "asciidoc"/"id": "asciidoc-private"/g' vss-extension.json
            sed -i 's/"name": "AsciiDoc PR Viewer"/"name": "AsciiDoc PR Viewer (Private Test Version)"/g' vss-extension.json
            tfx extension publish --manifests vss-extension.json --override "{\"public\": false}" --token ${{ secrets.AZURE_DEVOPS_PAT }} --share-with ${{ secrets.AZURE_DEVOPS_ORGANIZATION }} --rev-version
          else
            # For main branch, create the VSIX locally so it can be attached to the GitHub Release
            tfx extension create --manifests vss-extension.json --output-path ./dist/
            tfx extension publish --vsix dist/ajeckmans.asciidoc-${{ env.EXT_VERSION }}.vsix --token ${{ secrets.AZURE_DEVOPS_PAT }}
          fi

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.EXT_VERSION }}.${{ github.run_number }}" dist/ajeckmans.asciidoc-${{ env.EXT_VERSION }}.vsix --title "Release v${{ env.EXT_VERSION }} (Build ${{ github.run_number }})" --generate-notes
