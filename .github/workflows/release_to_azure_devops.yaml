name: Release to Azure DevOps Marketplace

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'

jobs:
  package-and-publish:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js environment
        uses: actions/setup-node@v2
        with:
          node-version: 'lts/*'

      - name: Set version
        run: |
          EXT_VERSION=$(grep -o '"version": *"[^"]*"' vss-extension.json | grep -o '[0-9.]*' | head -1)
          echo "EXT_VERSION=${EXT_VERSION}" >> $GITHUB_ENV

      - name: Restore npm packages
        run: npm ci --legacy-peer-deps

      - name: Run Tests
        run: npm run test

      - name: Build task bundle
        run: npm run build
        
      - name: Install tfx-cli
        run: npm install -g tfx-cli

      - name: Package Extension
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            sed -i 's/"id": "asciidoc"/"id": "asciidoc-private"/g' vss-extension.json
            sed -i 's/"name": "AsciiDoc PR Viewer"/"name": "AsciiDoc PR Viewer (Private Test Version)"/g' vss-extension.json
            tfx extension create --manifests vss-extension.json --override "{\"version\": \"${{ env.EXT_VERSION }}\", \"public\": false}" --output-path ./dist/
          else
            tfx extension create --manifests vss-extension.json --override "{\"version\": \"${{ env.EXT_VERSION }}\"}" --output-path ./dist/
          fi

      - name: Publish to Azure DevOps Marketplace
        id: publish
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            tfx extension publish --vsix dist/ajeckmans.asciidoc-private-${{ env.EXT_VERSION }}.vsix --token ${{ secrets.AZURE_DEVOPS_PAT }} --share-with ${{ secrets.AZURE_DEVOPS_ORGANIZATION }} --rev-version
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            tfx extension publish --vsix dist/ajeckmans.asciidoc-${{ env.EXT_VERSION }}.vsix --token ${{ secrets.AZURE_DEVOPS_PAT }} --rev-version
          else
            tfx extension publish --vsix dist/ajeckmans.asciidoc-${{ env.EXT_VERSION }}.vsix --token ${{ secrets.AZURE_DEVOPS_PAT }}
          fi

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.EXT_VERSION }}.${{ github.run_number }}" dist/ajeckmans.asciidoc-${{ env.EXT_VERSION }}.vsix --title "Release v${{ env.EXT_VERSION }} (Build ${{ github.run_number }})" --generate-notes
